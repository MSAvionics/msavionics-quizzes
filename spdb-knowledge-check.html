<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPDB Knowledge Check — MSAvionics</title>
<style>
  :root{
    --bg: #0B1622;
    --panel: #101F30;
    --panel-edge: #1C3148;
    --amber: #E8A33D;
    --amber-dim: #8a661f;
    --text: #F2F4F6;
    --text-dim: #93A2B5;
    --teal: #3D9685;
    --teal-dim: #1f4a42;
    --red: #C75450;
    --red-dim: #4a2424;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .rig{
    width:100%;
    max-width:640px;
  }

  .header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:14px;
    padding:0 4px;
  }

  .header .tag{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.12em;
    color:var(--amber);
    text-transform:uppercase;
  }

  .header .brand{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.08em;
  }

  .zonebar{
    display:flex;
    gap:4px;
    margin-bottom:20px;
  }
  .zone{
    flex:1;
    height:6px;
    background:var(--panel-edge);
    border-radius:1px;
    transition:background 0.3s ease;
  }
  .zone.filled{ background:var(--amber); }
  .zone.current{ background:var(--text-dim); }

  .card{
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:6px;
    padding:32px 28px;
    position:relative;
    overflow:hidden;
  }

  .card::before{
    content:'';
    position:absolute;
    top:0; left:0;
    width:3px;
    height:100%;
    background:var(--amber);
  }

  .qnum{
    font-family:var(--mono);
    font-size:13px;
    color:var(--amber);
    letter-spacing:0.08em;
    margin-bottom:10px;
  }

  .qtext{
    font-size:21px;
    line-height:1.4;
    font-weight:600;
    margin-bottom:24px;
    color:var(--text);
  }

  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .opt{
    display:flex;
    align-items:flex-start;
    gap:12px;
    background:var(--bg);
    border:1px solid var(--panel-edge);
    border-radius:5px;
    padding:14px 16px;
    cursor:pointer;
    font-size:15px;
    line-height:1.45;
    color:var(--text);
    transition:border-color 0.15s ease, background 0.15s ease;
    text-align:left;
  }

  .opt:hover:not(:disabled){
    border-color:var(--amber-dim);
  }

  .opt:focus-visible{
    outline:2px solid var(--amber);
    outline-offset:2px;
  }

  .opt .marker{
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-dim);
    flex-shrink:0;
    margin-top:1px;
  }

  .opt.correct{
    border-color:var(--teal);
    background:var(--teal-dim);
  }
  .opt.incorrect{
    border-color:var(--red);
    background:var(--red-dim);
  }
  .opt:disabled{ cursor:default; }
  .opt:disabled:not(.correct):not(.incorrect){ opacity:0.5; }

  .explain{
    margin-top:18px;
    padding-top:18px;
    border-top:1px solid var(--panel-edge);
    font-size:14px;
    line-height:1.6;
    color:var(--text-dim);
    display:none;
  }
  .explain.show{ display:block; }
  .explain strong{ color:var(--text); }
  .explain .insight{
    display:block;
    margin-top:10px;
    color:var(--amber);
    font-size:13px;
  }

  .nextwrap{
    margin-top:20px;
    display:none;
  }
  .nextwrap.show{ display:flex; justify-content:flex-end; }

  .btn{
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    background:var(--amber);
    color:#1a1106;
    border:none;
    border-radius:4px;
    padding:11px 22px;
    cursor:pointer;
    font-weight:600;
  }
  .btn:hover{ background:#f3b558; }
  .btn:focus-visible{ outline:2px solid var(--text); outline-offset:2px; }

  .readout{ display:none; }
  .readout.show{ display:block; }

  .readout-head{
    font-family:var(--mono);
    font-size:12px;
    color:var(--amber);
    letter-spacing:0.1em;
    margin-bottom:6px;
  }

  .readout-score{
    font-family:var(--mono);
    font-size:52px;
    font-weight:600;
    color:var(--text);
    line-height:1;
    margin-bottom:4px;
  }
  .readout-score span{ color:var(--text-dim); font-size:28px; }

  .readout-bar{
    display:flex;
    gap:4px;
    margin:18px 0 22px;
  }
  .readout-bar .seg{
    flex:1;
    height:8px;
    border-radius:1px;
  }
  .seg.hit{ background:var(--teal); }
  .seg.miss{ background:var(--red-dim); border:1px solid var(--red); }

  .verdict-label{
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-dim);
    letter-spacing:0.1em;
    margin-bottom:8px;
    text-transform:uppercase;
  }

  .verdict{
    font-size:19px;
    font-weight:600;
    line-height:1.5;
    margin-bottom:24px;
    color:var(--text);
  }

  .missed-block{
    background:var(--bg);
    border:1px solid var(--panel-edge);
    border-radius:5px;
    padding:16px 18px;
    margin-bottom:24px;
  }
  .missed-block .mb-title{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .missed-block ul{
    margin:0; padding-left:18px;
    font-size:14px;
    color:var(--text-dim);
    line-height:1.7;
  }
  .missed-block.none{ display:none; }

  .cta{
    border-top:1px solid var(--panel-edge);
    padding-top:22px;
    margin-top:6px;
  }

  .cta .cta-tag{
    font-family:var(--mono);
    font-size:11px;
    color:var(--amber);
    letter-spacing:0.1em;
    text-transform:uppercase;
    margin-bottom:8px;
  }

  .cta p{
    font-size:14.5px;
    color:var(--text-dim);
    line-height:1.6;
    margin:0 0 16px;
  }

  .cta-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .cta-row .btn.secondary{
    background:transparent;
    color:var(--text);
    border:1px solid var(--panel-edge);
  }
  .cta-row .btn.secondary:hover{ border-color:var(--amber-dim); }

  .restart{
    margin-top:18px;
    text-align:center;
  }
  .restart button{
    background:none;
    border:none;
    color:var(--text-dim);
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.05em;
    cursor:pointer;
    text-decoration:underline;
  }
  .restart button:hover{ color:var(--text); }

  @media (max-width:480px){
    .card{ padding:24px 18px; }
    .qtext{ font-size:18px; }
    .readout-score{
